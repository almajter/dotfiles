#~/.tmux.conf

# ── Prefix Key ──────────────────────────────────────
# Free up Ctrl+B (and Ctrl+F etc.) for normal use
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Mouse Support ───────────────────────────────────
# Normal scrolling, clicking, resizing
set -g mouse on

# ── Scrollback ──────────────────────────────────────
set -g history-limit 50000

# ── No Escape Delay ────────────────────────────────
set -sg escape-time 0

# ── Copy Mode (Vi style) ───────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Mouse drag auto-copies to macOS clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Paste from macOS clipboard
# bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"
bind p previous-window

# ── True Color Support ─────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Quality of Life ────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Reload Config ───────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split with | and -  (much more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in same directory
bind c new-window -c "#{pane_current_path}"

# Swap window positions
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Quick session switching
bind s choose-tree -sZ     # visual session picker
bind S new-session          # create new session

# Navigate panes with h, j, k, l
bind h select-pane -L    # ← left
bind j select-pane -D    # ↓ down
bind k select-pane -U    # ↑ up
bind l select-pane -R    # → right

# ── Status Bar ──────────────────────────────────────
set -g status-position top          # bar on top instead of bottom
set -g status-interval 5            # refresh every 5 seconds
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left side
set -g status-left-length 40
set -g status-left "#[fg=#89b4fa,bold] #S "   # session name

# Right side
set -g status-right-length 80
set -g status-right "#[fg=#a6adc8] %I:%M %p │ %b %d "   # time and date

# Window tabs
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "

# Set up shift+Enter (for claude code)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Clickable links
set -as terminal-features ",*:hyperlinks"
